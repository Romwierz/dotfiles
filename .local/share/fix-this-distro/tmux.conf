# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Status bar
set -g status-bg "#303446"
set -g status-fg "#c6d0f5"
set -g status-style bg=default
set -g status-right ""

set-option -sa terminal-overrides ",xterm*:Tc"
# Enable clipboard
# set -g set-clipboard on
# set -g @override_copy_command 'xclip -i -sel p -f | xclip -i -sel c'
# set -g @yank_selection 'clipboard'
# set-option -sa terminal-features ',*:clipboard'
set -g set-clipboard on
set -g @override_copy_command 'xclip -i -selection clipboard'
set -g @yank_selection 'clipboard'
set -as terminal-features ',*:clipboard'
set -g mouse on

# Start windows and panes numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Open panes in current directory
bind '_' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
